name: Daily Fuel Finder Ingest

on:
  schedule:
    - cron: "30 5 * * *"   # Daily at 05:30 UTC
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    environment: fuel_alerts

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
            python -m pip install --upgrade pip
            pip install -r requirements.txt

      - name: Run daily ingest
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FUEL_CLIENT_ID: ${{ secrets.FUEL_CLIENT_ID }}
          FUEL_CLIENT_SECRET: ${{ secrets.FUEL_CLIENT_SECRET }}
        run: |
          python scripts/daily_ingest.py
